version: 1

applications:


  #========================================
  - appRoot: apps/brianwhaley
    frontend:
      phases:
        preBuild:
          commands:
            - |
              echo "Env Var AMPLIFY_MONOREPO_APP_ROOT = $AMPLIFY_MONOREPO_APP_ROOT"
              APP_DIR=$(basename $(pwd))
              echo "Installing dependencies for monorepo..."
              pwd
              npm install --force
              echo "Dependencies installed"
        build:
          commands:
            - |
              APP_DIR=$(basename $(pwd))
              PARENT_DIR=$(basename $(dirname $(pwd)))
              echo "Building shared components..."
              cd ../../ && pwd
              npm run build -w packages/pixelated-components
              echo "Building Next.js app: $APP_DIR ..."
              npm run build -w $PARENT_DIR/$APP_DIR
              npm run generate-site-images -w $PARENT_DIR/$APP_DIR
        postBuild:
          commands:
            - echo "Calling Config Vault postbuild"
            - npm run config:vault -- postbuild || (echo "Config postbuild decrypt failed" && exit 1)
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - .next/static/**/*
          - node_modules/**/*


