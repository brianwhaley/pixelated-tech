#========================================
  - appRoot: tools/pixelated-admin
    frontend:
      phases:
        preBuild:
          commands:
            - |
              # Check changes for the app OR the shared components
              CHANGED=$(git diff --name-only origin/main...HEAD | grep -E "^(tools/pixelated-admin/|packages/pixelated-components/)" | wc -l)

              if [ "$CHANGED" -eq 0 ]; then
                echo "No changes detected. Creating skip token."
                touch ../../SKIP_BUILD_TOKEN
              else
                echo "Changes detected. Proceeding..."
                cd ../..
                npm install --force
              fi
        build:
          commands:
            - |
              if [ -f "../../SKIP_BUILD_TOKEN" ]; then
                echo "Skipping build phase..."
                mkdir -p .next
              else
                echo "Building dependent monorepo packages..."
                npm run build -w packages/pixelated-components
                cd ../../tools/pixelated-admin
                # Decrypt after shared package build so @pixelated-tech/components/scripts/config-vault.js resolves correctly.
                # This app still requires plaintext pixelated.config.json before the Next build.
                if [ -n "$PIXELATED_CONFIG_KEY" ]; then npm run config:decrypt || (echo "pixelated.config.json decrypt failed" && exit 1); else echo "PIXELATED_CONFIG_KEY not set; skipping config decrypt"; fi
                echo "Building Next.js app..."
                node -v
                npm run build
                npm run generate-site-images
              fi
        postBuild:
          commands:
            - |
              if [ -f "../../SKIP_BUILD_TOKEN" ]; then
                echo "Skipping postBuild phase..."
              else
                echo "Calling Config Vault postbuild"
                npm run config:vault -- postbuild
              fi
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - .next/static/**/*
          - node_modules/**/*


#========================================
  - appRoot: packages/pixelated-components
    frontend:
      phases:
        preBuild:
          commands:
            - |
              # Check changes for the shared components package only
              CHANGED=$(git diff --name-only origin/main...HEAD | grep -E "^(packages/pixelated-components/)" | wc -l)

              if [ "$CHANGED" -eq 0 ]; then
                echo "No changes detected. Creating skip token."
                touch ../../SKIP_BUILD_TOKEN
              else
                echo "Changes detected. Proceeding..."
                cd ../..
                npm install --force
              fi
        build:
          commands:
            - |
              if [ -f "../../SKIP_BUILD_TOKEN" ]; then
                echo "Skipping build phase..."
                mkdir -p storybook-static
              else
                echo "Building shared components package..."
                cd packages/pixelated-components
                rm -rf dist
                npm run build --legacy-peer-deps
                echo "Building Storybook with extra memory to avoid CI OOM"
                NODE_OPTIONS=--max-old-space-size=8192 npm run buildStorybook --legacy-peer-deps
              fi
        postBuild:
          commands:
            - |
              if [ -f "../../SKIP_BUILD_TOKEN" ]; then
                echo "Skipping postBuild phase..."
              else
                npm run config:vault -- postbuild
              fi
      artifacts:
        baseDirectory: storybook-static
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - .next/static/**/*
          - node_modules/**/*



