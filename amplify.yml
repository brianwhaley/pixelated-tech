version: 1

applications:

  - appRoot: apps/brianwhaley
    frontend:
      phases:
        preBuild:
          commands:
            - echo "Installing dependencies for monorepo..."
            - cd ../..
            # - rm -f package-lock.json
            # - npm cache clean --force
            # - rm -rf node_modules
            - npm install --force
            - echo "Dependencies installed"
        build:
          commands:
            - echo "Building dependent monorepo packages..."
            - cd packages/pixelated-components
            - rm -rf dist
            - npm run build
            - cd ../../apps/brianwhaley
            - echo "Building Next.js app..."
            - node -v
            - npm run build
            - npm run generate-site-images
        postBuild:
          commands:
            - echo "Calling Config Vault postbuild"
            - npm run config:vault -- postbuild || (echo "Config postbuild decrypt failed" && exit 1)
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - .next/static/**/*
          - node_modules/**/*

  - appRoot: apps/manningmetalworks
