version: 1

applications:


  #========================================
  - appRoot: apps/brianwhaley
    frontend:
      phases:
        preBuild:
          commands:
            - |
              APP_DIR=$(basename $(pwd))
              cd ../..
              CHANGED=$(git diff --name-only origin/main...HEAD | grep -E "^apps/$APP_DIR/" | wc -l)
              if [ "$CHANGED" -eq 0 ]; then
                echo "No changes detected for $APP_DIR. Build will be skipped."
                touch ../../SKIP_BUILD_TOKEN
              else
                echo "Changes detected for $APP_DIR. Proceeding with build."
                echo "Installing dependencies for monorepo..."
                node -v && npm -v
                pwd
                npm install --force
                echo "Dependencies installed"
              fi
        build:
          commands:
            - |
              if [ -f "../../SKIP_BUILD_TOKEN" ]; then
                echo "Skipping build phase..."
                mkdir -p .next
              else
                echo "Building shared components..."
                npm run build -w packages/pixelated-components
                echo "Building Next.js app..."
                npm run build -w apps/brianwhaley
                npm run generate-site-images -w apps/brianwhaley
              fi
        postBuild:
          commands:
            - |
              if [ -f "../../SKIP_BUILD_TOKEN" ]; then
                echo "Skipping postBuild."
              else
                echo "Calling Config Vault postbuild"
                npm run config:vault -- postbuild|| (echo "Config postbuild decrypt failed" && exit 1)
              fi
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - .next/static/**/*
          - node_modules/**/*


