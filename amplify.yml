version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Load app-specific Amplify configuration from .env.amplify
        - if [ -f .env.amplify ]; then export $(cat .env.amplify | xargs); echo "Loaded .env.amplify: AMPLIFY_MONOREPO_APP_ROOT=${AMPLIFY_MONOREPO_APP_ROOT}, AMPLIFY_DIFF_DEPLOY=${AMPLIFY_DIFF_DEPLOY}"; fi
        # Write env vars to .env for Next.js to access (covers both dev and prod)
        - if [ -f .env.amplify ]; then cat .env.amplify >> .env; fi
        - rm -f package-lock.json
        - npm cache clean --force
        - rm -rf node_modules
        - rm -rf .next
        - rm -rf out
        - npm install --force
        - echo "Dependencies installed"
    build:
      commands:
        - echo "Building Next.js app"
        - node -v
        - npm run build
        - npm run generate-site-images
    postBuild:
      commands:
        - echo "Calling Config Vault postbuild"
        - npm run config:vault -- postbuild || (echo "Config postbuild decrypt failed" && exit 1) 
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .next/static/**/*
      - node_modules/**/*
