version: 1

applications:


  #========================================
  - appRoot: apps/brianwhaley
    frontend:
      phases:
        preBuild:
          commands:
            - |
              # Check changes for the app OR the shared components
              CHANGED=$(git diff --name-only origin/main...HEAD | grep -E "^(apps/brianwhaley/|packages/pixelated-components/)" | wc -l)

              if [ "$CHANGED" -eq 0 ]; then
                echo "No changes detected. Creating skip token."
                touch ../../SKIP_BUILD_TOKEN
              else
                echo "Changes detected. Proceeding..."
                npm install --force
              fi
        build:
          commands:
            - |
              if [ -f "../../SKIP_BUILD_TOKEN" ]; then
                echo "Skipping build phase..."
                mkdir -p .next
              else
                echo "Building shared components..."
                npm run build -w packages/pixelated-components
                echo "Building Next.js app..."
                npm run build -w apps/brianwhaley
                npm run generate-site-images -w apps/brianwhaley
              fi
        postBuild:
          commands:
            - |
              if [ -f "../../SKIP_BUILD_TOKEN" ]; then
                echo "Skipping postBuild phase..."
              else
                npm run config:vault -- postbuild
              fi
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - .next/static/**/*
          - node_modules/**/*


