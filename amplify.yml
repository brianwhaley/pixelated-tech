#========================================
  - appRoot: tools/pixelated-admin
    frontend:
      phases:
        preBuild:
          commands:
            - |
              echo "Installing dependencies for monorepo: $AMPLIFY_MONOREPO_APP_ROOT ..."
              cd ../../ && pwd
              npm install --force
        build:
          commands:
            - |
              echo "Building shared components: $AMPLIFY_MONOREPO_APP_ROOT ..."
              npm run build -w packages/pixelated-components
              # Decrypt after shared package build so @pixelated-tech/components/scripts/config-vault.js resolves correctly.
              # This app still requires plaintext pixelated.config.json before the Next build.
              if [ -n "$PIXELATED_CONFIG_KEY" ]; then npm run config:decrypt -w $AMPLIFY_MONOREPO_APP_ROOT || (echo "pixelated.config.json decrypt failed" && exit 1); else echo "PIXELATED_CONFIG_KEY not set; skipping config decrypt"; fi
              echo "Building Next.js app: $AMPLIFY_MONOREPO_APP_ROOT ..."
              npm run build -w $AMPLIFY_MONOREPO_APP_ROOT
              npm run generate-site-images -w $AMPLIFY_MONOREPO_APP_ROOT
        postBuild:
          commands:
            - |
              echo "Calling Config Vault postbuild ..."
              npm run config:postbuild -w $AMPLIFY_MONOREPO_APP_ROOT || (echo "Config postbuild decrypt failed" && exit 1)
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - .next/static/**/*
          - node_modules/**/*


#========================================
  - appRoot: packages/pixelated-components
    frontend:
      phases:
        preBuild:
          commands:
            - |
              echo "Installing dependencies for monorepo: $AMPLIFY_MONOREPO_APP_ROOT ..."
              cd ../../ && pwd
              npm install --force
        build:
          commands:
            - |
              echo "Building shared components: $AMPLIFY_MONOREPO_APP_ROOT ..."
              npm run build -w packages/pixelated-components
              echo "Building Next.js app: $AMPLIFY_MONOREPO_APP_ROOT ..."
              npm run build -w $AMPLIFY_MONOREPO_APP_ROOT
              # npm run generate-site-images -w $AMPLIFY_MONOREPO_APP_ROOT
              # BUILD STORYBOOK WITH EXTRA MEMORY TO AVOID CI OOM
              echo "Building Storybook with extra memory to avoid CI OOM"
              NODE_OPTIONS=--max-old-space-size=8192 npm run buildStorybook --legacy-peer-deps
        postBuild:
          commands:
            - |
              echo "Calling Config Vault postbuild ..."
              npm run config:postbuild -w $AMPLIFY_MONOREPO_APP_ROOT || (echo "Config postbuild decrypt failed" && exit 1)
