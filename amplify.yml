#========================================
  - appRoot: apps/pixelated
    env:
      variables:
        APP_ROOT: "apps/pixelated"
    frontend:
      phases:
        preBuild:
          commands:
            - |
              echo "Env Var APP_ROOT = $APP_ROOT"
              echo "Env Var AMPLIFY_MONOREPO_APP_ROOT = $AMPLIFY_MONOREPO_APP_ROOT"
              APP_DIR=$(basename $(pwd))
              echo "Installing dependencies for monorepo: $APP_DIR ..."
              cd ../../ && pwd
              npm install --force
              echo "Dependencies installed"
        build:
          commands:
            - |
              APP_DIR=$(basename $(pwd))
              PARENT_DIR=$(basename $(dirname $(pwd)))
              echo "Building shared components: $AMPLIFY_MONOREPO_APP_ROOT ..."
              npm run build -w packages/pixelated-components
              echo "Building Next.js app: $AMPLIFY_MONOREPO_APP_ROOT ..."
              npm run build -w $AMPLIFY_MONOREPO_APP_ROOT
              npm run generate-site-images -w $AMPLIFY_MONOREPO_APP_ROOT
        postBuild:
          commands:
            - |
              echo "Calling Config Vault postbuild ..."
              pwd
              ls -la src/app/config || true
              ls -la .next/server || true
              npm run config:postbuild -w $AMPLIFY_MONOREPO_APP_ROOT || (echo "Config postbuild decrypt failed" && exit 1)
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - .next/static/**/*
          - node_modules/**/*


#========================================
  - appRoot: tools/pixelated-admin
    frontend:
      phases:
        preBuild:
          commands:
            - echo "Installing dependencies for monorepo..."
            - cd ../..
            - pwd
            - npm install --force
            - echo "Dependencies installed"
        build:
          commands:
            - echo "Building dependent monorepo packages..."
            - cd packages/pixelated-components
            - rm -rf dist
            - npm run build
            - cd ../../tools/pixelated-admin
            # Decrypt after shared package build so @pixelated-tech/components/scripts/config-vault.js resolves correctly.
            # This app still requires plaintext pixelated.config.json before the Next build.
            - if [ -n "$PIXELATED_CONFIG_KEY" ]; then npm run config:decrypt || (echo "pixelated.config.json decrypt failed" && exit 1); else echo "PIXELATED_CONFIG_KEY not set; skipping config decrypt"; fi
            - echo "Building Next.js app..."
            - node -v
            - npm run build
            - npm run generate-site-images
        postBuild:
          commands:
            # This postbuild inject is kept only for pixelated-admin and differs from other amplify app sections
            - echo "Calling Config Vault postbuild"
            - npm run config:vault -- postbuild || (echo "Config postbuild decrypt failed" && exit 1)
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - .next/static/**/*
          - node_modules/**/*


#========================================
  - appRoot: packages/pixelated-components
    frontend:
      phases:
        preBuild:
          commands:
            - |
              APP_DIR=$(basename $(pwd))
              echo "Installing dependencies for monorepo..."
              pwd
              npm install --force
              echo "Dependencies installed"
        build:
          commands:
            - |
              APP_DIR=$(basename $(pwd))
              PARENT_DIR=$(basename $(dirname $(pwd)))
              echo "Building Next.js app: $APP_DIR ..."
              cd ../../
              npm run build -w $PARENT_DIR/$APP_DIR
              # BUILD STORYBOOK WITH EXTRA MEMORY TO AVOID CI OOM
            - echo "Building Storybook with extra memory to avoid CI OOM"
            - NODE_OPTIONS=--max-old-space-size=8192 npm run buildStorybook --legacy-peer-deps
        postBuild:
          commands:
            - echo "Calling Config Vault postbuild"
            - npm run config:vault -- postbuild || (echo "Config postbuild decrypt failed" && exit 1)
      artifacts:
        baseDirectory: storybook-static
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - .next/static/**/*
          - node_modules/**/*



