version: 1
applications:
  - appRoot: apps/manningmetalworks
    frontend:
      phases:
        preBuild:
          commands:
            - cd ../..
            - rm -f package-lock.json
            - npm cache clean --force
            - rm -rf node_modules
            - npm install --force
            - echo "Dependencies installed"
            - cd packages/pixelated-components
            - rm -rf dist
            - npm install --force
            - npm run build
            - cd ../../apps/manningmetalworks
        build:
          commands:
            - node -v
            - npm run build
            - npm run generate-site-images
        postBuild:
          commands:
            - echo "Calling Config Vault postbuild"
            - npm run config:vault -- postbuild || (echo "Config postbuild decrypt failed" && exit 1)
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - .next/static/**/*
          - node_modules/**/*
